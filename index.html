<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASHRE WORLD | عالم الإبداع التقني</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff0000;
            --secondary: #ff4d4d;
            --bg: #000;
            --glass: rgba(255, 255, 255, 0.03);
            --blur: blur(15px);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* دوائر الخلفية الضبابية */
        .bg-blur {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            background: #000;
        }
        .circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: moveCircles 15s infinite alternate ease-in-out;
        }
        .c1 { width: 400px; height: 400px; background: var(--primary); top: -150px; left: -100px; }
        .c2 { width: 300px; height: 300px; background: #550000; bottom: -50px; right: -50px; animation-delay: 3s; }
        @keyframes moveCircles { from { transform: translate(0,0); } to { transform: translate(60px, 120px) rotate(10deg); } }

        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            backdrop-filter: var(--blur);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* الـ Container للاسم بتأثير البرق */
        .name-container {
            position: relative;
            padding: 15px 40px;
            border-radius: 15px;
            /* هالة البرق الأساسية */
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5),
                        0 0 20px rgba(255, 0, 0, 0.3) inset;
            animation: lightningBorder 2s linear infinite;
        }

        /* حافة البرق النيوني المتحركة */
        .name-container::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 17px;
            background: linear-gradient(45deg, var(--primary), #fff, var(--primary), #ff9999);
            background-size: 400%;
            z-index: -1;
            filter: blur(10px);
            opacity: 0;
            animation: lightningFlicker 2s infinite;
        }

        .hero-name {
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 900;
            margin: 0;
            color: white;
            letter-spacing: 5px;
            /* توهج النص كأن فيه كهرباء */
            text-shadow: 0 0 10px #fff,
                         0 0 20px var(--primary),
                         0 0 30px var(--primary),
                         0 0 40px var(--secondary);
            animation: textPower 1s ease-in-out infinite alternate;
        }

        /* أنميشن رمش البرق النيوني للمستطيل */
        @keyframes lightningFlicker {
            0%, 15%, 100% { opacity: 0; background-position: 0% 50%; }
            10%, 20% { opacity: 1; background-position: 100% 50%; }
            12%, 18% { opacity: 0.5; }
        }

        /* أنميشن توهج النص كأنه ماس كهربائي */
        @keyframes textPower {
            from { text-shadow: 0 0 10px #fff, 0 0 20px var(--primary); }
            to { text-shadow: 0 0 15px #fff, 0 0 30px var(--secondary), 0 0 40px var(--primary); }
        }

        /* حركات السوشيال والزراير */
        .social-bar { display: flex; gap: 20px; margin-top: 30px; animation: fadeIn 2s ease-in; }
        .social-icon { color: #aaa; font-size: 1.3rem; transition: 0.3s; }
        .social-icon:hover { color: white; transform: translateY(-3px) scale(1.1); filter: drop-shadow(0 0 5px #fff); }

        .btn-order {
            margin-top: 50px;
            padding: 15px 40px;
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.4s;
            box-shadow: 0 0 10px rgba(255,0,0,0.2);
            cursor: pointer;
        }
        .btn-order:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 30px var(--primary);
            transform: scale(1.05);
        }

        /* فورم الطلب بنظام Glassmorphism */
        .order-section { padding: 80px 20px; text-align: center; background: rgba(5,5,5,0.5); }
        .order-form {
            max-width: 500px;
            margin: 0 auto;
            background: var(--glass);
            backdrop-filter: var(--blur);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input, textarea {
            width: 100%; padding: 12px; margin-bottom: 15px;
            background: rgba(0,0,0,0.4); border: 1px solid #222;
            color: white; border-radius: 8px; font-family: 'Cairo'; box-sizing: border-box;
        }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 10px rgba(255,0,0,0.2); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

    <div class="social-bar">

        <a href="https://t.me/A_S_7_E" class="social-icon"><i class="fab fa-telegram"></i></a>
        <a href="https://instagram.com/mo_ashre" class="social-icon"><i class="fab fa-instagram"></i></a>

    </div>
</div>
