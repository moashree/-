<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASHRY NETWORK | الإمبراطورية العظمى</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap');

        :root {
            --red: #ff0000;
            --dark-red: #660000;
            --black: #080808;
            --glass: rgba(15, 15, 15, 0.9);
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--black);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* خلفية الأنمي المتحركة */
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: radial-gradient(circle at 50% 50%, #1a0000 0%, #000 100%);
        }
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            opacity: 0.3;
        }

        /* المانجيكيو شارينجان الأصلية (SVG) */
        .sharingan-container {
            width: 180px; height: 180px;
            position: relative;
            animation: rotateSharingan 15s linear infinite;
            filter: drop-shadow(0 0 20px var(--red));
            margin-bottom: 20px;
        }

        @keyframes rotateSharingan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* الهيرو */
        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding: 0 20px;
        }

        .hero h1 {
            font-family: 'Orbitron'; font-size: clamp(2.5rem, 8vw, 5rem);
            margin: 10px 0; text-shadow: 0 0 30px var(--red);
        }

        /* الأقسام المنسدلة */
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        details {
            background: var(--glass);
            border: 1px solid var(--dark-red);
            border-radius: 15px;
            margin-bottom: 25px;
            transition: 0.3s;
        }

        details[open] { border-color: var(--red); box-shadow: 0 0 20px rgba(255,0,0,0.2); }

        summary {
            padding: 25px; font-size: 1.5rem; font-weight: 900;
            cursor: pointer; list-style: none; display: flex; align-items: center; gap: 15px;
        }

        summary::before { content: "⌬"; color: var(--red); font-size: 1.8rem; }

        .form-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px; padding: 30px; border-top: 1px solid #333;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }

        label { color: var(--red); font-weight: bold; font-size: 0.9rem; }

        input, select, textarea {
            padding: 15px; background: #000; border: 1px solid #222;
            border-radius: 10px; color: #fff; font-family: 'Cairo';
            transition: 0.3s;
        }

        input:focus { border-color: var(--red); outline: none; box-shadow: 0 0 10px var(--dark-red); }

        .btn-submit {
            grid-column: 1 / -1; padding: 20px;
            background: linear-gradient(45deg, #800000, #ff0000);
            color: white; border: none; border-radius: 10px;
            font-weight: 900; font-size: 1.2rem; cursor: pointer;
            transition: 0.4s; text-transform: uppercase;
        }

        .btn-submit:hover { letter-spacing: 3px; transform: scale(1.02); }

        /* نظام التعليقات */
        .reviews-section { margin-top: 60px; padding: 30px; background: rgba(255,255,255,0.02); border-radius: 20px; }
        .review-card { background: #111; padding: 20px; border-radius: 12px; margin-bottom: 15px; border-right: 5px solid var(--red); animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }

        footer { text-align: center; padding: 50px; color: #444; border-top: 1px solid #111; }

    </style>
</head>
<body>

    <div class="bg-animate"></div>
    <div class="bg-overlay"></div>

    <section class="hero">
        <div class="sharingan-container">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="48" fill="#ff0000" stroke="black" stroke-width="1"/>
                <path d="M50 2 C 30 20, 30 80, 50 98 C 70 80, 70 20, 50 2" fill="black" transform="rotate(0 50 50)"/>
                <path d="M50 2 C 30 20, 30 80, 50 98 C 70 80, 70 20, 50 2" fill="black" transform="rotate(60 50 50)"/>
                <path d="M50 2 C 30 20, 30 80, 50 98 C 70 80, 70 20, 50 2" fill="black" transform="rotate(120 50 50)"/>
                <circle cx="50" cy="50" r="12" fill="#ff0000" stroke="black" stroke-width="2"/>
                <circle cx="50" cy="50" r="5" fill="black"/>
            </svg>
        </div>
        <h1>ASHRY NETWORK</h1>
        <p>CONTROL THE DOMAIN | الإمبراطورية الرقمية</p>
        
        <div style="display:flex; gap:25px; margin:20px; font-size: 28px;">
            <a href="https://wa.me/201038760809" style="color:white"><i class="fab fa-whatsapp"></i></a>
            <a href="https://t.me/ashry_network" style="color:white"><i class="fab fa-telegram"></i></a>
            <a href="#" style="color:white"><i class="fab fa-youtube"></i></a>
            <a href="#" style="color:white"><i class="fab fa-instagram"></i></a>
        </div>
    </section>

    <div class="container">

        <details>
            <summary>🎮 عشري ستور | ASHRY STORE</summary>
            <div class="form-grid">
                <div class="input-group"><label>الاسم الكامل</label><input type="text" id="st_name"></div>
                <div class="input-group"><label>رقم الهاتف (واتساب)</label><input type="text" id="st_phone"></div>
                <div class="input-group"><label>الجيميل</label><input type="email" id="st_mail"></div>
                <div class="input-group">
                    <label>اللعبة / الخدمة</label>
                    <select id="st_game">
                        <option>PUBG Mobile (Global/Egypt)</option><option>Free Fire Diamonds</option>
                        <option>Roblox Robux</option><option>E-Football Coins</option>
                        <option>Valorant Points</option><option>Discord Nitro</option>
                        <option>Ludo Star Gems</option><option>8 Ball Pool Cash</option>
                        <option>TikTok Coins</option><option>PlayStation Cards</option>
                    </select>
                </div>
                <div class="input-group"><label>الآي دي (ID)</label><input type="text" id="st_id"></div>
                <div class="input-group"><label>الكمية</label><input type="number" id="st_qty"></div>
                <button class="btn-submit" onclick="send('Store')">إتمام الطلب ⚡</button>
            </div>
        </details>

        <details>
            <summary>🎨 عشري ديزاين | ASHRY DESIGN</summary>
            <div class="form-grid">
                <div class="input-group"><label>الاسم</label><input type="text" id="ds_name"></div>
                <div class="input-group">
                    <label>نوع التصميم</label>
                    <select id="ds_type">
                        <option>لوجو براند (Minimalist)</option><option>لوجو قيمنق (Mascot)</option>
                        <option>بنر يوتيوب / تويتش</option><option>تصميم منتجات وأكياس (3D)</option>
                        <option>موشن جرافيك (Motion)</option><option>تعديل صور (Retouch)</option>
                    </select>
                </div>
                <div class="input-group" style="grid-column: 1 / -1;"><label>وصف الفكرة بالتفصيل</label><textarea id="ds_desc" rows="4"></textarea></div>
                <button class="btn-submit" onclick="send('Design')">بدأ الإبداع 🎨</button>
            </div>
        </details>

        <details>
            <summary>🌐 عشري ويب | ASHRY WEB</summary>
            <div class="form-grid">
                <div class="input-group"><label>اسم المشروع</label><input type="text" id="web_title"></div>
                <div class="input-group">
                    <label>نوع الموقع</label>
                    <select id="web_type">
                        <option>صفحة هبوط (Landing Page)</option><option>متجر إلكتروني (E-commerce)</option>
                        <option>موقع شركة (Business)</option><option>برمجة بوت تليجرام</option>
                    </select>
                </div>
                <div class="input-group" style="grid-column: 1 / -1;"><label>المميزات (مثلاً: نظام دفع، لغات متعددة)</label><textarea id="web_desc" rows="3"></textarea></div>
                <button class="btn-submit" onclick="send('Web')">طلب البرمجة 💻</button>
            </div>
        </details>

        <details>
            <summary>🛡️ السايبر & أكاديمية | CYBER & ACADEMY</summary>
            <div class="form-grid">
                <div class="input-group">
                    <label>المسار المختار</label>
                    <select id="cy_type">
                        <option>كورس الاختراق الأخلاقي (كامل)</option><option>كورس اختراق المواقع</option>
                        <option>كورس تعلم بايثون من الصفر</option><option>تأمين شامل للحسابات</option>
                        <option>استرجاع داتا مخترقة</option><option style="color:red">خدمة سحب بيانات (خاص)</option>
                    </select>
                </div>
                <div class="input-group"><label>الاسم</label><input type="text" id="cy_name"></div>
                <button class="btn-submit" onclick="send('Cyber')">حجز مكانك ⚔️</button>
            </div>
        </details>

        <div class="reviews-section">
            <h2 style="text-align: center; color: var(--red);">آراء العملاء ⭐</h2>
            <div id="comment_box"></div>
            
            <div style="margin-top: 30px; border-top: 1px solid #222; padding-top: 20px;">
                <input type="text" id="user_name" placeholder="اسمك">
                <textarea id="user_comment" placeholder="اكتب رأيك هنا..." rows="3"></textarea>
                <button class="btn-submit" onclick="postComment()" style="padding: 10px;">نشر التعليق</button>
            </div>
        </div>

    </div>

    <footer>⌬ ASHRY NETWORK - UCHIHA POWER 2026 ⌬</footer>

    <script>
        const phoneNum = "201038760809";

        // وظيفة إرسال البيانات للواتساب بتنسيق فخم
        function send(type) {
            let msg = `*طلب جديد من: ${type}*%0A`;
            msg += `--------------------------%0A`;
            msg += `تواصل معي لتنفيذ الطلب.`;
            window.open(`https://wa.me/${phoneNum}?text=${msg}`, '_blank');
        }

        // وظيفة التعليقات مع الحفظ في المتصفح
        function postComment() {
            const name = document.getElementById('user_name').value;
            const text = document.getElementById('user_comment').value;
            if(!name || !text) return alert("املا الخانات يا بطل!");

            const comment = { name, text, date: new Date().toLocaleDateString() };
            let comments = JSON.parse(localStorage.getItem('ashry_comments') || '[]');
            comments.push(comment);
            localStorage.setItem('ashry_comments', JSON.stringify(comments));
            renderComments();
            document.getElementById('user_name').value = '';
            document.getElementById('user_comment').value = '';
        }

        function renderComments() {
            const box = document.getElementById('comment_box');
            let comments = JSON.parse(localStorage.getItem('ashry_comments') || '[]');
            box.innerHTML = comments.map(c => `
                <div class="review-card">
                    <strong>${c.name}</strong> <small style="color:#555">(${c.date})</small>
                    <p style="margin:10px 0 0 0">${c.text}</p>
                </div>
            `).join('');
        }

        // تشغيل التعليقات عند الفتح
        window.onload = renderComments;
    </script>
</body>
</html>
