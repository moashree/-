<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashry Network | عـشـري</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@500;900&display=swap');

        :root {
            --uchicha-red: #ff0000;
            --dark-void: #020202;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--dark-void);
            color: #eee;
            font-family: 'Cairo', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        .bg-fixed {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://wallpapercave.com/wp/wp8365604.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* الشارينجان */
        .sharingan {
            width: 120px;
            height: 120px;
            background-color: var(--uchicha-red);
            border: 4px solid #000;
            border-radius: 50%;
            position: relative;
            animation: rotate 6s linear infinite;
            box-shadow: 0 0 25px var(--uchicha-red);
        }

        .sharingan:before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 25px; height: 25px;
            background: #000;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .tomoe {
            position: absolute;
            width: 15px; height: 15px;
            background: #000;
            border-radius: 50%;
        }

        .t1 { top: 15%; left: 45%; }
        .t2 { bottom: 20%; left: 15%; }
        .t3 { bottom: 20%; right: 15%; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin: 20px 0;
            text-shadow: 0 0 20px var(--uchicha-red);
        }

        .btn-explore {
            padding: 15px 40px;
            border: 2px solid var(--uchicha-red);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.4s;
            background: rgba(255,0,0,0.05);
        }

        .btn-explore:hover {
            background: var(--uchicha-red);
            box-shadow: 0 0 40px var(--uchicha-red);
            transform: scale(1.1);
        }

        .services {
            padding: 80px 20px;
            max-width: 850px;
            margin: 0 auto;
        }

        details {
            background: rgba(10,10,10,0.9);
            margin-bottom: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,0,0,0.2);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        summary {
            padding: 20px;
            font-size: 1.3rem;
            cursor: pointer;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: bold;
        }

        summary:hover { background: rgba(255,0,0,0.1); }

        .content { padding: 25px; background: rgba(0,0,0,0.5); }

        input, select, textarea {
            width: 100%; padding: 14px; margin: 10px 0;
            background: #000; border: 1px solid #333;
            border-radius: 8px; color: #fff; font-family: 'Cairo';
        }

        .btn-send {
            width: 100%; padding: 18px;
            background: var(--uchicha-red); color: white;
            border: none; border-radius: 8px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }

        .btn-send:hover { letter-spacing: 2px; box-shadow: 0 0 15px var(--uchicha-red); }

        footer { text-align: center; padding: 40px; color: #444; }
    </style>
</head>
<body>

    <div class="bg-fixed"></div>

    <section class="hero">
        <div class="sharingan">
            <div class="tomoe t1"></div>
            <div class="tomoe t2"></div>
            <div class="tomoe t3"></div>
        </div>
        <h1>ASHRY NETWORK</h1>
        <a href="#main" class="btn-explore">دخول النطاق (Domain Expansion) ⌬</a>
    </section>

    <section id="main" class="services">
        
        <details>
            <summary>🎮 عشري ستور | ASHRY STORE</summary>
            <div class="content">
                <select id="st_game">
                    <option value="PUBG UC">ببجي موبايل (UC)</option>
                    <option value="Free Fire">فري فاير (Diamonds)</option>
                    <option value="Roblox">روبلوكس (Robux)</option>
                    <option value="Discord Nitro">ديسكورد نيترو</option>
                </select>
                <input type="text" id="st_name" placeholder="الاسم">
                <input type="text" id="st_id" placeholder="الآي دي (ID)">
                <input type="number" id="st_qty" placeholder="الكمية">
                <input type="text" id="st_phone" placeholder="رقم هاتفك">
                <button class="btn-send" onclick="sendStore()">إرسال الطلب</button>
            </div>
        </details>

        <details>
            <summary>🎨 عشري ديزاين | ASHRY DESIGN</summary>
            <div class="content">
                <select id="ds_type">
                    <option value="Logo">لوجو (Logo)</option>
                    <option value="Banner">بنر (Banner)</option>
                    <option value="Packaging">أكياس تجارية</option>
                </select>
                <input type="text" id="ds_name" placeholder="الاسم">
                <input type="text" id="ds_title" placeholder="اسم البراند">
                <textarea id="ds_desc" rows="3" placeholder="وصف التصميم"></textarea>
                <input type="text" id="ds_phone" placeholder="رقم الهاتف">
                <button class="btn-send" onclick="sendDesign()">إرسال الطلب</button>
            </div>
        </details>

        <details>
            <summary>🌐 عشري ويب | ASHRY WEB</summary>
            <div class="content">
                <select id="web_type">
                    <option value="Personal Website">موقع شخصي (Portfolio)</option>
                    <option value="E-commerce Store">متجر إلكتروني</option>
                    <option value="Landing Page">صفحة هبوط (Landing Page)</option>
                    <option value="Admin Panel">لوحة تحكم (Admin Panel)</option>
                    <option value="Fixed HTML/CSS">برمجة صفحة ثابتة</option>
                </select>
                <input type="text" id="web_name" placeholder="اسمك">
                <input type="text" id="web_title" placeholder="اسم الموقع المطلوب">
                <textarea id="web_desc" rows="3" placeholder="اشرح فكرة موقعك وعدد الصفحات"></textarea>
                <input type="text" id="web_phone" placeholder="رقم هاتفك">
                <button class="btn-send" onclick="sendWeb()">طلب برمجة الموقع</button>
            </div>
        </details>

        <details>
            <summary>🛡️ الأمن السيبراني | CYBER SECURITY</summary>
            <div class="content">
                <select id="cy_goal">
                    <option value="Web Hacking">اختراق الويب ✅</option>
                    <option value="Linux">تعلم لينكس ✅</option>
                    <option value="Illegal" style="color:red">سحب داتا (غير قانوني) ⚠️</option>
                </select>
                <input type="text" id="cy_name" placeholder="الاسم">
                <textarea id="cy_desc" rows="3" placeholder="المطلوب بالتفصيل"></textarea>
                <input type="text" id="cy_phone" placeholder="رقم الهاتف">
                <button class="btn-send" onclick="sendCyber()">إرسال الطلب</button>
            </div>
        </details>

    </section>

    <footer>⌬ ASHRY NETWORK - UCHIHA CLAN 2026 ⌬</footer>

    <script>
        const myNum = "201038760809";

        function sendStore() {
            const msg = `╔════════════════════╗%0A║ ⚡ *𝐀𝐒𝐇𝐑𝐘 𝐒𝐓𝐎𝐑𝐄* ⚡%0A╠════════════════════╝%0A⌬ *NAME:* ${document.getElementById('st_name').value}%0A⌬ *GAME:* ${document.getElementById('st_game').value}%0A⌬ *ID:* ${document.getElementById('st_id').value}%0A⌬ *TEL:* ${document.getElementById('st_phone').value}%0A╚───────────────────╼`;
            window.open(`https://wa.me/${myNum}?text=${msg}`, '_blank');
        }

        function sendDesign() {
            const msg = `┌─── ⋆ *𝐀𝐒𝐇𝐑𝐘 𝐃𝐄𝐒𝐈𝐆𝐍* ⋆ ───┐%0A❖ *CLIENT:* ${document.getElementById('ds_name').value}%0A❖ *ART:* ${document.getElementById('ds_type').value}%0A❖ *DESC:* ${document.getElementById('ds_desc').value}%0A❖ *TEL:* ${document.getElementById('ds_phone').value}%0A└───────────────────┘`;
            window.open(`https://wa.me/${myNum}?text=${msg}`, '_blank');
        }

        function sendWeb() {
            const msg = `🌐 ⟦ *𝐀𝐒𝐇𝐑𝐘 𝐖𝐄𝐁* ⟧ 🌐%0A❯── *CLIENT:* ${document.getElementById('web_name').value}%0A❯── *TYPE:* ${document.getElementById('web_type').value}%0A❯── *TITLE:* ${document.getElementById('web_title').value}%0A❯── *DESC:* ${document.getElementById('web_desc').value}%0A❯── *TEL:* ${document.getElementById('web_phone').value}%0A⌞───────────────────⌟`;
            window.open(`https://wa.me/${myNum}?text=${msg}`, '_blank');
        }

        function sendCyber() {
            const msg = `⚔️ ⟦ *𝐂𝐘𝐁𝐄𝐑-𝐒𝐄𝐂* ⟧ ⚔️%0A❯── *USER:* ${document.getElementById('cy_name').value}%0A❯── *PATH:* ${document.getElementById('cy_goal').value}%0A❯── *TEL:* ${document.getElementById('cy_phone').value}%0A⌞───────────────────⌟`;
            window.open(`https://wa.me/${myNum}?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
