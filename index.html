<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASHRE DESIGN | المصمم الأسطوري</title>
    <style>
        :root {
            --primary-color: #ff0000;
            --bg-dark: #050505;
            --card-bg: #111;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            scroll-behavior: smooth;
        }
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #220000 0%, #050505 100%);
            text-align: center;
        }
        .hero-title { font-size: 4rem; text-transform: uppercase; margin-bottom: 10px; color: var(--primary-color); text-shadow: 0 0 20px rgba(255,0,0,0.5); }
        .hero-sub { font-size: 1.5rem; color: #888; margin-bottom: 30px; }
        .btn-group { display: flex; gap: 20px; }
        .btn {
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.4s;
            cursor: pointer;
        }
        .btn-main { background: var(--primary-color); color: white; box-shadow: 0 0 15px var(--primary-color); }
        .btn-main:hover { transform: scale(1.1); box-shadow: 0 0 30px var(--primary-color); }
        .btn-outline { border: 2px solid var(--primary-color); color: var(--primary-color); }
        
        .section { padding: 100px 20px; text-align: center; }
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .work-card {
            background: var(--card-bg);
            height: 250px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #222;
            transition: 0.3s;
            overflow: hidden;
            position: relative;
        }
        .work-card:hover { border-color: var(--primary-color); transform: translateY(-5px); }
        .work-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }

        .order-form {
            max-width: 500px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid #333;
        }
        input, textarea, select {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: #1a1a1a;
            border: 1px solid #444;
            color: white;
            border-radius: 10px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<header>
    <h1 class="hero-title">ASHRE DESIGN</h1>
    <p class="hero-sub">نحول خيالك إلى واقع بصري مذهل</p>
    <div class="btn-group">
        <a href="#portfolio" class="btn btn-main">مشاهدة أعمالي</a>
        <a href="#order" class="btn btn-outline">طلب تصميم جديد</a>
    </div>
</header>

<div id="portfolio" class="section">
    <h2>معرض التصميمات</h2>
    <div class="portfolio-grid">
        <div class="work-card"><p>لوجو احترافي</p></div>
        <div class="work-card"><p>بنر يوتيوب 4K</p></div>
        <div class="work-card"><p>تصميم بوستر سينمائي</p></div>
    </div>
</div>

<div id="order" class="section">
    <h2>اطلب تصميمك الآن</h2>
    <div class="order-form">
        <input type="text" id="userName" placeholder="اسمك الكريم">
        <input type="text" id="phone" placeholder="رقم تليفونك">
        <input type="text" id="designTitle" placeholder="اسم التصميم (مثلاً: لوجو قناة)">
        <select id="designType">
            <option value="Logo">لوجو</option>
            <option value="Banner">بنر</option>
            <option value="Thumbnail">مصغرة فيديو</option>
            <option value="Other">آخر</option>
        </select>
        <textarea id="details" rows="4" placeholder="اكتب تفاصيل طلبك هنا..."></textarea>
        <button class="btn btn-main" style="width: 100%; border: none;" onclick="sendWhatsApp()">إرسال الطلب عبر واتساب</button>
    </div>
</div>

<script>
    function sendWhatsApp() {
        let name = document.getElementById('userName').value;
        let phone = document.getElementById('phone').value;
        let title = document.getElementById('designTitle').value;
        let type = document.getElementById('designType').value;
        let details = document.getElementById('details').value;

        // استبدل الرقم ده برقم تليفونك أنت بالصيغة الدولية (بدون أصفار أو علامة +)
        let myNumber = "201000000000"; 

        let message = `طلب تصميم جديد 🎨%0A%0A` +
                      `👤 الاسم: ${name}%0A` +
                      `📞 الموبايل: ${phone}%0A` +
                      `🏷 العنوان: ${title}%0A` +
                      `📁 النوع: ${type}%0A` +
                      `📝 التفاصيل: ${details}`;

        window.open(`https://wa.me/${myNumber}?text=${message}`, '_blank');
    }
</script>

</body>
</html>
