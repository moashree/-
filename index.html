<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASHRE | عالم الإبداع الرقمي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff0000;
            --glass: rgba(255, 255, 255, 0.05);
            --blur: blur(15px);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #000;
            color: white;
            margin: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* دوائر الخلفية الضبابية */
        .bg-blur {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            background: #000;
        }
        .circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: move 10s infinite alternate;
        }
        .c1 { width: 400px; height: 400px; background: var(--primary); top: -100px; left: -100px; }
        .c2 { width: 300px; height: 300px; background: #550000; bottom: -50px; right: -50px; animation-delay: 2s; }
        @keyframes move { from { transform: translate(0,0); } to { transform: translate(50px, 100px); } }

        /* حركة الاسم الأسطورية */
        .nav-name {
            position: fixed;
            top: 20px;
            width: 100%;
            text-align: center;
            z-index: 1000;
            font-weight: 900;
            font-size: 2rem;
            letter-spacing: 5px;
        }
        .nav-name span {
            display: inline-block;
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary);
            animation: flip 3s infinite;
        }
        @keyframes flip {
            0%, 80% { transform: rotateY(0); }
            90% { transform: rotateY(360deg); }
        }
        /* توقيت مختلف لكل حرف لزيادة الحركة */
        .nav-name span:nth-child(1) { animation-delay: 0.1s; }
        .nav-name span:nth-child(2) { animation-delay: 0.2s; }
        .nav-name span:nth-child(3) { animation-delay: 0.3s; }
        .nav-name span:nth-child(4) { animation-delay: 0.4s; }
        .nav-name span:nth-child(5) { animation-delay: 0.5s; }

        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--glass);
            backdrop-filter: var(--blur);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .social-bar { display: flex; gap: 25px; margin-top: 30px; }
        .social-icon { color: white; font-size: 1.5rem; transition: 0.3s; }
        .social-icon:hover { color: var(--primary); transform: translateY(-5px); }

        .section { padding: 100px 20px; text-align: center; }

        /* كروت الخدمات بنظام كود */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .service-card {
            background: var(--glass);
            backdrop-filter: var(--blur);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.4s;
        }
        .service-card:hover {
            border-color: var(--primary);
            background: rgba(255,0,0,0.05);
            transform: scale(1.02);
        }
        .service-card i { font-size: 3rem; color: var(--primary); margin-bottom: 20px; }

        /* فورم الطلب */
        .order-form {
            max-width: 600px;
            margin: 0 auto;
            background: var(--glass);
            backdrop-filter: var(--blur);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        input, textarea {
            width: 100%; padding: 15px; margin-bottom: 15px;
            background: rgba(0,0,0,0.5); border: 1px solid #333;
            color: white; border-radius: 12px; outline: none;
            box-sizing: border-box; font-family: 'Cairo';
        }
        input:focus { border-color: var(--primary); }

        .btn-main {
            padding: 18px 50px;
            background: var(--primary);
            color: white;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            box-shadow: 0 10px 20px rgba(255,0,0,0.3);
            transition: 0.3s;
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255,0,0,0.5); }
    </style>
</head>
<body>

<div class="bg-blur">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
</div>

<div class="nav-name">
    <span>A</span><span>S</span><span>H</span><span>R</span><span>E</span>
</div>

<header>
    <h2 style="font-size: 1.5rem; letter-spacing: 2px; color: #888;">مرحباً بك في مساحتي الإبداعية</h2>
    <div class="social-bar">
        <a href="https://youtube.com" class="social-icon"><i class="fab fa-youtube"></i></a>
        <a href="https://t.me/A_S_7_E" class="social-icon"><i class="fab fa-telegram"></i></a>
        <a href="https://instagram.com/mo_ashre" class="social-icon"><i class="fab fa-instagram"></i></a>
    </div>
</header>

<div class="section">
    <div class="services-grid">
        <div class="service-card">
            <i class="fas fa-terminal"></i>
            <h3>تعديل الملفات</h3>
            <p>احترافية في التعامل مع ملفات النظام وتعديل التطبيقات بدقة متناهية.</p>
        </div>
        <div class="service-card">
            <i class="fas fa-bezier-curve"></i>
            <h3>هوية بصرية</h3>
            <p>تصميم بنرات ولوجوهات بلمسة أسطورية تعكس قوتك التقنية.</p>
        </div>
        <div class="service-card">
            <i class="fas fa-rocket"></i>
            <h3>سرعة التنفيذ</h3>
            <p>تسليم الطلبات في وقت قياسي وبأعلى جودة ممكنة.</p>
        </div>
    </div>
</div>

<div id="order" class="section">
    <div class="order-form">
        <h3 style="margin-bottom: 30px; font-size: 1.8rem;">ارسل طلبك الآن ⚡</h3>
        <input type="text" id="userName" placeholder="اسمك الكامل">
        <input type="text" id="designTitle" placeholder="عنوان الخدمة">
        <textarea id="details" rows="4" placeholder="اوصف لنا إبداعك القادم..."></textarea>
        <button class="btn-main" onclick="sendWhatsApp()">إرسال الطلب للمصمم</button>
    </div>
</div>

<script>
    function sendWhatsApp() {
        let name = document.getElementById('userName').value;
        let title = document.getElementById('designTitle').value;
        let details = document.getElementById('details').value;
        let myNumber = "4915511928928"; 

        if(!name || !title) { alert("من فضلك املأ البيانات الأساسية"); return; }

        let message = `*طلب إبداعي جديد من الموقع* ⚡%0A%0A` +
                      `👤 *العميل:* ${name}%0A` +
                      `💎 *نوع الخدمة:* ${title}%0A` +
                      `━━━━━━━━━━━━━━━%0A` +
                      `📝 *التفاصيل:* %0A${details}%0A` +
                      `━━━━━━━━━━━━━━━%0A` +
                      `🚀 *تم الإرسال عبر ASHRE WORLD*`;

        window.open(`https://wa.me/${myNumber}?text=${message}`, '_blank');
    }
</script>

</body>
</html>
