<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashry Network | عـشـري</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@500;900&display=swap');

        :root {
            --primary: #00d2ff;
            --accent: #9d00ff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: #0a0a0c;
            color: white;
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.alphacoders.com/131/1311029.jpg'); /* خلفية أنمي */
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        /* تأثيرات خلفية متحركة */
        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, rgba(157, 0, 255, 0.1) 0%, transparent 50%);
            animation: pulse 10s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        header {
            text-align: center;
            padding: 50px 20px;
            animation: fadeInDown 1s ease;
        }

        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            letter-spacing: 5px;
            text-shadow: 0 0 20px var(--primary);
            margin-bottom: 10px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .social-links a {
            color: white;
            font-size: 24px;
            transition: 0.3s;
            background: var(--glass);
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .social-links a:hover {
            transform: translateY(-5px);
            color: var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .badge-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .badge-card:hover {
            transform: scale(1.03);
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
        }

        .badge-card h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--primary);
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            margin-top: 0;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
        }

        .btn-send {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--accent), var(--primary));
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            font-family: 'Cairo';
        }

        .btn-send:hover {
            letter-spacing: 2px;
            box-shadow: 0 0 20px var(--primary);
        }

        .illegal-tag { color: #ff4b2b; font-weight: bold; }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .main-title { font-size: 2rem; }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="bg-animate"></div>

    <header>
        <h1 class="main-title">⌬ ASHRY NETWORK</h1>
        <p>Your Gateway to Store, Design & Security</p>
        
        <div class="social-links">
            <a href="https://instagram.com/your_user" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://t.me/your_user" target="_blank"><i class="fab fa-telegram"></i></a>
            <a href="https://youtube.com/@your_user" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://wa.me/201038760809" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
    </header>

    <div class="container">
        
        <div class="badge-card">
            <h2>⌬ عشري ستور | Ashry Store</h2>
            <input type="text" id="store_name" placeholder="الاسم بالكامل">
            <input type="text" id="store_phone" placeholder="رقم الهاتف">
            <select id="store_game">
                <option value="PUBG Mobile">PUBG Mobile</option>
                <option value="Free Fire">Free Fire</option>
                <option value="Roblox">Roblox</option>
                <option value="Call of Duty">Call of Duty</option>
            </select>
            <input type="number" id="store_qty" placeholder="الكمية">
            <input type="text" id="store_id" placeholder="ID الحساب">
            <button class="btn-send" onclick="sendStore()">ارسال الطلب ⚡</button>
        </div>

        <div class="badge-card">
            <h2>⌬ عشري ديزاين | Ashry Design</h2>
            <input type="text" id="ds_name" placeholder="اسم الشخص">
            <input type="text" id="ds_phone" placeholder="رقم الهاتف">
            <input type="text" id="ds_title" placeholder="اسم التصميم">
            <select id="ds_type">
                <option value="Logo Design">لوجو (Logo)</option>
                <option value="Social Media">سوشيال ميديا</option>
                <option value="Branding">هوية بصرية</option>
                <option value="Packaging">تغليف (Shopping Bags)</option>
                <option value="Thumbnail">غلاف يوتيوب</option>
            </select>
            <textarea id="ds_desc" rows="3" placeholder="وصف التصميم بالتفصيل"></textarea>
            <button class="btn-send" onclick="sendDesign()">ارسال التصميم 🎨</button>
        </div>

        <div class="badge-card">
            <h2>⌬ تعليم واتساب | WA Academy</h2>
            <input type="text" id="wa_name" placeholder="الاسم">
            <input type="text" id="wa_phone" placeholder="رقم الهاتف">
            <input type="email" id="wa_email" placeholder="الجيميل">
            <textarea id="wa_desc" rows="3" placeholder="ماذا تريد أن تتعلم؟"></textarea>
            <button class="btn-send" onclick="sendWAEdu()">ارسال الطلب 🛠️</button>
        </div>

        <div class="badge-card">
            <h2>⌬ الأمن السيبراني | Cyber Sec</h2>
            <p style="font-size: 12px; margin-bottom: 10px;">خريطة المجال والتعلم:</p>
            <select id="cy_goal">
                <option value="أساسيات الشبكات">أساسيات الشبكات ✅</option>
                <option value="اختبار الاختراق الأخلاقي">اختبار الاختراق الأخلاقي ✅</option>
                <option value="تأمين الحسابات">تأمين الحسابات ✅</option>
                <option value="اختراق حسابات (غير قانوني)" class="illegal-tag">اختراق حسابات (غير قانوني) ⚠️</option>
                <option value="سحب داتا (غير قانوني)" class="illegal-tag">سحب داتا (غير قانوني) ⚠️</option>
            </select>
            <input type="text" id="cy_name" placeholder="الاسم">
            <input type="text" id="cy_phone" placeholder="رقم الهاتف">
            <input type="email" id="cy_email" placeholder="الجيميل">
            <textarea id="cy_desc" rows="3" placeholder="وصف الشيء الذي تريد تعلمه بدقة"></textarea>
            <button class="btn-send" onclick="sendCyber()">ارسال الطلب 🛡️</button>
        </div>

    </div>

    <script>
        const myNum = "201038760809";

        function sendStore() {
            const name = document.getElementById('store_name').value;
            const phone = document.getElementById('store_phone').value;
            const game = document.getElementById('store_game').value;
            const qty = document.getElementById('store_qty').value;
            const id = document.getElementById('store_id').value;

            const msg = `╔════════════════════╗%0A║ ⚡ *𝐀𝐒𝐇𝐑𝐘 𝐒𝐓𝐎𝐑𝐄* ⚡%0A╠════════════════════╝%0A👤 *العميل:* ${name}%0A🕹️ *اللعبة:* ${game}%0A💎 *الكمية:* ${qty}%0A🆔 *الآي دي:* \`${id}\` %0A📱 *التواصل:* ${phone}%0A╚───────────────────╼`;
            window.open(`https://wa.me/${myNum}?text=${msg}`, '_blank');
        }

        function sendDesign() {
            const name = document.getElementById('ds_name').value;
            const phone = document.getElementById('ds_phone').value;
            const title = document.getElementById('ds_title').value;
            const type = document.getElementById('ds_type').value;
            const desc = document.getElementById('ds_desc').value;

            const msg = `┌─── ⋆ *𝐀𝐒𝐇𝐑𝐘 𝐃𝐄𝐒𝐈𝐆𝐍* ⋆ ───┐%0A❖ *العميل:* ${name} 👤%0A❖ *الاسم:* ${title} ✨%0A❖ *الطلب:* ${type} 🖼️%0A❖ *الوصف:* ${desc} 📝%0A❖ *التواصل:* ${phone} 📞%0A└───────────────────┘`;
            window.open(`https://wa.me/${myNum}?text=${msg}`, '_blank');
        }

        function sendWAEdu() {
            const name = document.getElementById('wa_name').value;
            const phone = document.getElementById('wa_phone').value;
            const email = document.getElementById('wa_email').value;
            const desc = document.getElementById('wa_desc').value;

            const msg = `╔═ ❮ *𝐖𝐀-𝐀𝐂𝐀𝐃𝐄𝐌𝐘* ❯ ══════╗%0A◈ *الطالب:* ${name} 👨‍💻%0A◈ *الجيميل:* ${email} 📧%0A◈ *الاحتياج:* ${desc} 📚%0A◈ *الهاتف:* ${phone} 📱%0A╚════════════════════╝`;
            window.open(`https://wa.me/${myNum}?text=${msg}`, '_blank');
        }

        function sendCyber() {
            const name = document.getElementById('cy_name').value;
            const phone = document.getElementById('cy_phone').value;
            const email = document.getElementById('cy_email').value;
            const goal = document.getElementById('cy_goal').value;
            const desc = document.getElementById('cy_desc').value;

            const msg = `⚔️ ⟦ *𝐂𝐘𝐁𝐄𝐑 𝐒𝐄𝐂𝐔𝐑𝐈𝐓𝐘* ⟧ ⚔️%0A❯── *الاسم:* ${name} 👤%0A❯── *الحالة:* ${goal}%0A❯── *المطلوب:* ${desc} 🔍%0A❯── *الجيميل:* ${email} 📧%0A❯── *الهاتف:* ${phone} 📱%0A⌞───────────────────⌟`;
            window.open(`https://wa.me/${myNum}?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
