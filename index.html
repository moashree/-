<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <title>⌬ ASHRY NETWORK | OFFICIAL HUB 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ⌬ ASHRY NETWORK - MEGA CUSTOM CODE ⌬ */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --primary: #ff0000; --bg: #050505; --card: rgba(15,15,15,0.98);
            --text: #ffffff; --border: #1a1a1a; --glitch: #00ffff;
        }

        [data-theme="light"] {
            --primary: #0066ff; --bg: #f4f7f6; --card: #ffffff;
            --text: #1a1a1a; --border: #ddd;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; transition: 0.5s; overflow-x: hidden; }

        /* Background Effects */
        #c { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.12; pointer-events: none; }

        /* UI Elements */
        .t-btn { position: fixed; top: 25px; left: 25px; z-index: 1000; background: var(--primary); width: 55px; height: 55px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: 0 0 20px var(--primary); transition: 0.3s; }
        .t-btn:hover { transform: rotate(180deg) scale(1.1); }

        /* Hero */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle at center, rgba(255,0,0,0.05) 0%, transparent 70%); }
        .eye-wrap { width: 240px; height: 240px; filter: drop-shadow(0 0 40px var(--primary)); animation: rot 20s linear infinite; cursor: pointer; margin-bottom: 20px; }
        @keyframes rot { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .hero h1 { font-family: 'Orbitron'; font-size: clamp(3.5rem, 12vw, 7rem); letter-spacing: 12px; margin: 15px 0; text-shadow: 3px 3px 0 var(--primary); position: relative; }
        .hero h1::after { content: '⌬'; position: absolute; top: -20px; right: -40px; font-size: 2rem; color: var(--primary); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .socials { display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; justify-content: center; }
        .socials a { color: var(--text); font-size: 2rem; transition: 0.4s; position: relative; }
        .socials a:hover { color: var(--primary); transform: translateY(-8px); }
        .socials a span { position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); font-size: 0.7rem; font-family: 'Orbitron'; opacity: 0; }
        .socials a:hover span { opacity: 1; }

        /* Containers */
        .wrap { max-width: 1200px; margin: -60px auto 100px; padding: 0 20px; position: relative; z-index: 10; }
        .box { background: var(--card); border: 1px solid var(--border); border-radius: 25px; margin-bottom: 30px; transition: 0.4s ease; overflow: hidden; }
        .box:hover { border-color: var(--primary); box-shadow: 0 15px 45px rgba(0,0,0,0.4); }
        
        .h { padding: 30px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(90deg, rgba(255,0,0,0.05), transparent); }
        .h h2 { display: flex; align-items: center; gap: 15px; font-size: 1.6rem; font-weight: 900; }
        .h i.arrow { transition: 0.4s; color: var(--primary); }
        .box.open i.arrow { transform: rotate(180deg); }

        .b { max-height: 0; overflow: hidden; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); padding: 0 30px; }
        .box.open .b { max-height: 2500px; padding: 40px 30px; border-top: 1px solid var(--border); }

        /* Form Controls */
        .client-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; padding-bottom: 25px; border-bottom: 1px dashed var(--border); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        
        .field { position: relative; margin-bottom: 15px; }
        label { color: var(--primary); font-weight: 700; margin-bottom: 10px; display: block; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        
        input, select, textarea { 
            width: 100%; padding: 15px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); 
            border-radius: 12px; color: #fff; font-family: 'Cairo'; transition: 0.3s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(255,0,0,0.2); }
        
        [data-theme="light"] input, [data-theme="light"] select, [data-theme="light"] textarea { background: #fff; color: #000; }
        
        .btn { 
            width: 100%; padding: 20px; background: var(--primary); color: #fff; border: none; 
            border-radius: 15px; font-weight: 900; cursor: pointer; transition: 0.4s; 
            font-size: 1.2rem; margin-top: 25px; display: flex; align-items: center; justify-content: center; gap: 12px; 
        }
        .btn:hover { background: #b30000; box-shadow: 0 0 30px var(--primary); transform: translateY(-5px); }

        /* Reviews Section */
        .rev-card { background: rgba(255,255,255,0.02); padding: 25px; border-radius: 20px; border-right: 5px solid var(--primary); margin-bottom: 20px; transition: 0.3s; }
        .rev-card:hover { transform: translateX(-10px); background: rgba(255,255,255,0.05); }
        .rev-card strong { color: var(--primary); font-size: 1.1rem; display: block; margin-bottom: 8px; }
        .rev-card p { font-size: 0.95rem; line-height: 1.7; opacity: 0.9; }

        footer { text-align: center; padding: 60px 20px; background: rgba(0,0,0,0.3); color: var(--primary); font-family: 'Orbitron'; font-size: 0.9rem; letter-spacing: 3px; }

        /* Animation */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

<script>
    // 1. Matrix Background
    const canvas = document.getElementById("c"), ctx = canvas.getContext("2d");
    canvas.height = window.innerHeight; canvas.width = window.innerWidth;
    const chars = "⌬ASHRY01010101NETWORKSYSTEMSECURITY";
    const fontSize = 17, drops = [];
    for(let i=0; i<canvas.width/fontSize; i++) drops[i] = 1;
    function drawMatrix() {
        ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = document.body.getAttribute('data-theme') === 'dark' ? "#ff0000" : "#0066ff";
        ctx.font = fontSize + "px JetBrains Mono";
        for(let i=0; i<drops.length; i++) {
            const text = chars[Math.floor(Math.random()*chars.length)];
            ctx.fillText(text, i*fontSize, drops[i]*fontSize);
            if(drops[i]*fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 35);

    // 2. Theme Toggle
    function toggleTheme() {
        const b = document.body;
        b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    // 3. Section Toggle
    function toggle(id) {
        document.querySelectorAll('.box').forEach(b => { if(b.id !== id) b.classList.remove('open'); });
        document.getElementById(id).classList.toggle('open');
    }

    // 4. Advanced WhatsApp Ordering System
    function order(type, sectionId) {
        const sec = document.getElementById(sectionId);
        const name = sec.querySelector('.c_name').value;
        const phone = sec.querySelector('.c_phone').value;
        const email = sec.querySelector('.c_mail') ? sec.querySelector('.c_mail').value : 'غير متوفر';
        
        if(!name || !phone) { alert('يا بطل كمل بياناتك (الاسم والرقم) عشان نعرف نتواصل معاك!'); return; }

        let msg = `*⌬ طلب جديد من موقع ASHRY NETWORK*%0A`;
        msg += `---------------------------%0A`;
        msg += `👤 الاسم: ${name}%0A`;
        msg += `📞 الواتساب: ${phone}%0A`;
        msg += `📧 الجيميل: ${email}%0A`;
        msg += `---------------------------%0A`;
        msg += `📂 القسم: ${type}%0A`;

        if(type === 'Store') {
            msg += `🎮 اللعبة: ${sec.querySelector('.g_name').value}%0A🆔 الآيدي: ${sec.querySelector('.g_id').value}%0A💰 الكمية: ${sec.querySelector('.g_qty').value}`;
        } else if(type === 'Web') {
            msg += `💻 النوع: ${sec.querySelector('.w_type').value}%0A📝 الوصف: ${sec.querySelector('.w_desc').value}`;
        } else if(type === 'Cyber') {
            msg += `🛡️ الخدمة: ${sec.querySelector('.cy_type').value}%0A📑 التفاصيل: ${sec.querySelector('.cy_desc').value}`;
        } else if(type === 'Bots') {
            msg += `🤖 المنصة: ${sec.querySelector('.bot_plat').value}%0A⚙️ الوظيفة: ${sec.querySelector('.bot_desc').value}`;
        } else if(type === 'SMM') {
            msg += `📈 المنصة: ${sec.querySelector('.smm_plat').value}%0A🔗 الرابط: ${sec.querySelector('.smm_link').value}%0A👥 العدد: ${sec.querySelector('.smm_qty').value}`;
        } else if(type === 'Design') {
            msg += `🎨 النوع: ${sec.querySelector('.d_type').value}%0A✒️ النص: ${sec.querySelector('.d_text').value}`;
        }

        window.open(`https://wa.me/201038760809?text=${msg}`, '_blank');
    }

    // 5. Professional Review Data
    const reviews = [
        {u:"Youssef_7", t:"طلبت سكريبت سحب بيانات بايثون وخلص في يوم واحد، كود منظم جداً."},
        {u:"Gamer_Pro", t:"شحنت 8100 UC ووصلوا في 5 دقايق، بجد عشري ستور ثقة."},
        {u:"Ahmed_Branding", t:"اللوجو التايبوغرافي اللي اتعملي ميز البراند بتاعي جداً عن المنافسين."},
        {u:"Secure_Man", t:"تأمين حساب الفيس والتليجرام تم باحترافية، والرد سريع جداً."},
        {u:"SMM_Expert", t:"زودت أعضاء قناتي تليجرام والعدد ثابت مفيش نقص، شكراً يا بطل."},
        {u:"Shadow_Dev", t:"بوت التليجرام اللي برمجتهولي شغال 24 ساعة مفيش فيه غلطة."},
        {u:"M. Ali", t:"أفضل خدمة عملاء تقنية قابلتها في 2026."},
        {u:"Dina_Art", t:"تصميمات ملابس عالمية، فنان ومبدع يا عشري."},
        {u:"Black_Hat", t:"اختبار الاختراق للموقع بتاعي كشف ثغرات مكنتش اتخيلها."},
        {u:"Kimo", t:"شحن كوينز إي فوتبول فوري، موقع محترم جداً."},
        {u:"Mustafa", t:"الـ Landing Page اللي اتعملتلي خلت المبيعات تزيد الضعف."},
        {u:"Ziad", t:"برمجة سكريبتات بمستوى عالمي وسعر منافس."},
        {u:"Hassan", t:"أسرع ستور شحن في مصر بدون مبالغة."},
        {u:"Omar", t:"تأمين الحسابات عنده جبار، أنصح بيه الكل."},
        {u:"Eslam", t:"لوجو القيمنق 3D بتاعي طلع تحفة فنية."},
        {u:"Ismail", t:"زودت متابعين تيك توك ووصلوا كلهم حقيقيين."},
        {u:"Samy", t:"بوت الديسكورد اللي عملتهولي فيه مميزات مش عند حد."},
        {u:"Fady", t:"دائماً متطور وشغلك يرفع الراس يا عشري."},
        {u:"Nader", t:"استرجعت حسابي اللي كان مسروق في أقل من ساعتين."},
        {u:"Ashry_Fan", t:"موقع فخم يليق باسم الشبكة، استمر."}
    ];

    function renderReviews() {
        const list = document.getElementById('review_list'); list.innerHTML = '';
        reviews.forEach(r => {
            list.innerHTML += `<div class="rev-card"><strong>⌬ ${r.u}</strong><p>${r.t}</p></div>`;
        });
    }

    function addReview() {
        const u = document.getElementById('rev_u').value, c = document.getElementById('rev_c').value;
        if(!u || !c) return;
        reviews.unshift({u, t:c}); renderReviews();
        document.getElementById('rev_u').value=''; document.getElementById('rev_c').value='';
    }
    renderReviews();
</script>
