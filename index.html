<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⌬ ASHRY NETWORK | OFFICIAL 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ⌬ ASHRY NETWORK - FULL CUSTOM CODE 2026 ⌬ */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --primary: #ff0000; --bg: #050505; --card: rgba(15,15,15,0.98);
            --text: #ffffff; --border: #1a1a1a; --glitch: #00ffff;
        }

        [data-theme="light"] {
            --primary: #0066ff; --bg: #f4f7f6; --card: #ffffff;
            --text: #1a1a1a; --border: #ddd;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; transition: 0.5s; overflow-x: hidden; }

        /* Matrix Background */
        #c { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.1; }

        /* Custom Scroll */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        /* Theme Toggle */
        .t-btn { position: fixed; top: 25px; left: 25px; z-index: 1000; background: var(--primary); width: 55px; height: 55px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: 0 0 20px var(--primary); }

        /* Hero & Eye */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .eye-wrap { width: 220px; height: 220px; filter: drop-shadow(0 0 30px var(--primary)); animation: rot 15s linear infinite; cursor: pointer; }
        @keyframes rot { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .hero h1 { font-family: 'Orbitron'; font-size: clamp(3rem, 10vw, 6rem); letter-spacing: 10px; margin: 20px 0; text-shadow: 0 0 15px var(--primary); }
        .tagline { font-size: 1.2rem; color: var(--primary); font-family: 'JetBrains Mono'; letter-spacing: 3px; }

        .socials { display: flex; gap: 25px; margin-top: 30px; }
        .socials a { color: var(--text); font-size: 2.2rem; transition: 0.4s; }
        .socials a:hover { color: var(--primary); transform: scale(1.2) translateY(-5px); }

        /* Main Container */
        .wrap { max-width: 1100px; margin: -50px auto 100px; padding: 0 20px; }
        .box { background: var(--card); border: 1px solid var(--border); border-radius: 20px; margin-bottom: 25px; transition: 0.3s; overflow: hidden; }
        .box:hover { border-color: var(--primary); box-shadow: 0 0 20px rgba(255,0,0,0.1); }
        .h { padding: 25px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(90deg, rgba(255,0,0,0.03), transparent); }
        .h h2 { display: flex; align-items: center; gap: 15px; font-size: 1.5rem; }
        .b { max-height: 0; overflow: hidden; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); padding: 0 25px; }
        .box.open .b { max-height: 1500px; padding: 30px 25px; }

        /* Forms */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        label { color: var(--primary); font-weight: bold; margin-bottom: 8px; display: block; font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 14px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 10px; color: #fff; font-family: 'Cairo'; }
        [data-theme="light"] input, [data-theme="light"] select, [data-theme="light"] textarea { background: #fff; color: #000; }
        
        .btn { width: 100%; padding: 18px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.3s; font-size: 1.1rem; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:hover { box-shadow: 0 0 25px var(--primary); transform: translateY(-3px); }

        /* Reviews */
        .rev-card { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; border-right: 4px solid var(--primary); margin-bottom: 15px; animation: slideUp 0.5s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .rev-card strong { color: var(--primary); display: block; margin-bottom: 5px; }

        footer { text-align: center; padding: 50px; opacity: 0.6; font-family: 'Orbitron'; font-size: 0.8rem; }
    </style>
</head>
<body data-theme="dark">

<canvas id="c"></canvas>
<div class="t-btn" onclick="toggleTheme()"><i class="fas fa-eye"></i></div>

<section class="hero">

    </div>

        <div class="b">

                <div><label>الآيدي ID</label><input type="text" id="g_i"></div>

            <button class="btn" onclick="send('Store')">طلب شحن فوري <i class="fas fa-bolt"></i></button>
        </div>
    </div>

    <div class="box" id="s2">
        <div class="h" onclick="toggle('s2')"><h2><i class="fas fa-code"></i> سكريبتات وبرمجة ويب</h2><i class="fas fa-plus"></i></div>
        <div class="b">
            <div class="grid">
                <div><label>الخدمة</label><select id="w_t"><option>سكريبت خاص (Python/PHP)</option><option>متجر إلكتروني</option><option>موقع بورتفوليو</option><option>Landing Page</option></select></div>
                <div style="grid-column: 1/-1"><label>وصف المشروع</label><textarea id="w_d" rows="4"></textarea></div>
            </div>
            <button class="btn" onclick="send('Web')">بدأ البرمجة <i class="fas fa-terminal"></i></button>
        </div>
    </div>

    <div class="box" id="s3">
        <div class="h" onclick="toggle('s3')"><h2><i class="fas fa-shield-alt"></i> الأمن السيبراني</h2><i class="fas fa-plus"></i></div>
        <div class="b">
            <div class="grid">
                <div><label>نوع العملية</label><select id="c_t"><option>تأمين حسابات</option><option>اختبار اختراق (Red Team)</option><option>برمجة بوتات حماية</option><option>استرجاع حسابات</option></select></div>
                <div style="grid-column: 1/-1"><label>التفاصيل التقنية</label><textarea id="c_d" rows="3"></textarea></div>
            </div>
            <button class="btn" onclick="send('Cyber')">تنفيذ المهمة <i class="fas fa-user-secret"></i></button>
        </div>
    </div>

    <div class="box" id="s4">
        <div class="h" onclick="toggle('s4')"><h2><i class="fas fa-paint-brush"></i> ⌬ ASHRY DESIGN</h2><i class="fas fa-plus"></i></div>
        <div class="b">
            <div class="grid">
                <div><label>الستايل</label><select id="d_t"><option>Typography (أسماء)</option><option>لوجو ملابس</option><option>3D Gaming Logo</option><option>بنر يوتيوب</option></select></div>
                <div><label>النص المراد تصميمه</label><input type="text" id="d_n"></div>
            </div>
            <button class="btn" onclick="send('Design')">بدأ التصميم <i class="fas fa-palette"></i></button>
        </div>
    </div>

    <div style="margin-top: 60px;">
        <h2 style="text-align: center; color: var(--primary); font-family: 'Orbitron'; margin-bottom: 30px;">⌬ NETWORK FEEDBACK</h2>
        <div id="r-list"></div>
        <div style="background: var(--card); padding: 25px; border-radius: 20px; border: 1px dashed var(--primary); margin-top: 30px;">
            <div class="grid"><input type="text" id="r_u" placeholder="اسمك"><textarea id="r_c" placeholder="رأيك التقني..."></textarea></div>
            <button class="btn" style="width: 180px; font-size: 0.9rem; padding: 12px;" onclick="addR()">نشر</button>
        </div>
    </div>
</div>

<footer>⌬ ASHRY NETWORK | THE CORE OF TECH 2026</footer>

<script>
    // Matrix Background Logic
    const c = document.getElementById("c"), ctx = c.getContext("2d");
    c.height = window.innerHeight; c.width = window.innerWidth;
    const char = "⌬ASHRY0101NETWORK$#@%&*";
    const f = 16, drops = [];
    for(let i=0; i<c.width/f; i++) drops[i] = 1;
    function draw() {
        ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,c.width,c.height);
        ctx.fillStyle = document.body.getAttribute('data-theme') === 'dark' ? "#ff0000" : "#0066ff";
        ctx.font = f + "px Orbitron";
        for(let i=0; i<drops.length; i++) {
            const txt = char[Math.floor(Math.random()*char.length)];
            ctx.fillText(txt, i*f, drops[i]*f);
            if(drops[i]*f > c.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 35);

    function toggleTheme() {
        const b = document.body; b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    function toggle(id) {
        document.querySelectorAll('.box').forEach(el => { if(el.id !== id) el.classList.remove('open'); });
        document.getElementById(id).classList.toggle('open');
    }

    function send(s) {
        let m = `*⌬ ASHRY NETWORK ORDER*%0Aالقسم: ${s}%0A-----------------%0A`;
        if(s==='Store') m += `اللعبة: ${document.getElementById('g_n').value}%0AID: ${document.getElementById('g_i').value}%0Aالكمية: ${document.getElementById('g_q').value}`;
        window.open(`https://wa.me/201038760809?text=${m}`, '_blank');
    }

    const reviews = [
        {u:"Ziad_Dev", t:"السكريبت اللي عشري عملهولي بلغة بايثون سريع جداً ومنظم. كود نضيف فعلاً."},
        {u:"Shadow_Gamer", t:"شحنت 8100 UC ووصلوا في وقت قياسي، ثقة عمياء بجد."},
        {u:"Ahmed_Typography", t:"لوجو الاسم Typography اللي اتعملي فكرته عالمية، ميز البراند بتاعي."},
        {u:"Cyber_King", t:"تأمين الحسابات عنده ملوش حل، رجعت حسابي بعد ما فقدت الأمل."},
        {u:"Mostafa_Tech", t:"أفضل مبرمج تعاملت معاه في سكريبتات السحب والتأمين."},
        {u:"M. Khaled", t:"شحن كوينز إي فوتبول فوري، موقع صادق 100%."},
        {u:"Noor_Design", t:"الـ 3D Gaming Logo طلع فخم جداً وبدقة عالية."},
        {u:"Omar_Security", t:"شرح Red Teaming كان واضح جداً وفادني في شغلي."},
        {u:"Hassan_Gamer", t:"روبوكس وكول أوف ديوتي، أرخص سعر في السوق."},
        {u:"Ali_Dev", t:"الـ Landing Page اللي اتبرمجتلي سريعة جداً وSEO ممتاز."},
        {u:"Kareem", t:"مصداقية وسرعة في الرد، أنصح الكل بالتعامل معاه."},
        {u:"Hany_Ashry", t:"دائماً متألق يا عشري، الشغل مفيش فيه غلطة."},
        {u:"Youssef", t:"بوت الحماية بتاع التليجرام شغال بقاله شهر مفيش هبد."},
        {u:"Abdo", t:"تصميمات ملابس عالمية، فنان يا وحش."},
        {u:"Tarek", t:"رجعت حسابي المخترق في أقل من 24 ساعة."},
        {u:"Ismail", t:"شحن فالورانت فوري، ثقة 100%."},
        {u:"Sayed", t:"التعامل معاه مريح جداً وفهمان في شغله."},
        {u:"Gamer_X", t:"أفضل ستور شحن في 2026 بلا منازع."},
        {u:"Technical_Mind", t:"كود السكريبت احترافي ومحمي من الثغرات."},
        {u:"Ashry_Fan", t:"كل الدعم ليك يا بطل، موقع واجهة تشرف."}
    ];

    function renderR() {
        const list = document.getElementById('r-list'); list.innerHTML = '';
        reviews.forEach(r => {
            list.innerHTML += `<div class="rev-card"><strong>⌬ ${r.u}</strong><p>${r.t}</p></div>`;
        });
    }

    function addR() {
        const u = document.getElementById('r_u').value, c = document.getElementById('r_c').value;
        if(!u || !c) return;
        reviews.unshift({u, t:c}); renderR();
        document.getElementById('r_u').value=''; document.getElementById('r_c').value='';
    }
    renderR();
</script>
</body>
</html>
