<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASHRY NETWORK | 2026 OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --red: #ff0000; --black: #050505; --card-bg: rgba(15, 15, 15, 0.98);
            --text: #fff; --input-bg: #000; --border: #1a1a1a; --eye-show: flex;
        }

        [data-theme="light"] {
            --red: #0066ff; --black: #f5f5f5; --card-bg: #ffffff;
            --text: #1a1a1a; --input-bg: #fff; --border: #ddd; --eye-show: none;
        }

        * { box-sizing: border-box; outline: none; }
        body, html {
            margin: 0; padding: 0; background: var(--black); color: var(--text);
            font-family: 'Cairo', sans-serif; transition: 0.5s; overflow-x: hidden;
        }

        .theme-btn {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            background: var(--red); color: #fff; border: none;
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 15px var(--red); display: flex; align-items: center; justify-content: center;
        }

        .eye-section {
            height: 100vh; display: var(--eye-show); flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        .sharingan-svg {
            width: 250px; height: 250px; filter: drop-shadow(0 0 30px var(--red));
            animation: rotateEye 20s linear infinite;
        }
        @keyframes rotateEye { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .hero-title {
            font-family: 'Orbitron', sans-serif; font-size: clamp(3rem, 15vw, 6rem);
            font-weight: 900; background: linear-gradient(to bottom, var(--text) 40%, var(--red));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 20px 0;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; margin-bottom: 20px; }
        .box-head { padding: 25px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .box-body { max-height: 0; overflow: hidden; transition: 0.5s ease-in-out; padding: 0 25px; }
        .box.open .box-body { max-height: 1000px; padding-bottom: 25px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; }
        label { color: var(--red); font-size: 0.85rem; font-weight: bold; display: block; margin-bottom: 5px; }
        input, select, textarea {
            width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border);
            border-radius: 10px; color: var(--text); font-family: 'Cairo'; margin-bottom: 10px;
        }
        .btn-send {
            width: 100%; padding: 15px; background: var(--red); color: #fff;
            border: none; border-radius: 10px; font-weight: 900; cursor: pointer; transition: 0.3s;
        }

        .rev-card { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 10px; border-right: 4px solid var(--red); }
    </style>
</head>
<body data-theme="dark">

<button class="theme-btn" onclick="toggleTheme()"><i class="fas fa-adjust"></i></button>

<section class="eye-section">
    <svg class="sharingan-svg" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="48" fill="#000"/>
        <circle cx="50" cy="50" r="45" fill="#ff0000"/>
        <path d="M 50 15 A 35 35 0 1 0 50 85 A 35 35 0 1 0 50 15" fill="none" stroke="#000" stroke-width="7"/>
        <circle cx="50" cy="15" r="7" fill="#000"/><circle cx="20" cy="68" r="7" fill="#000"/><circle cx="80" cy="68" r="8" fill="#000"/>
        <circle cx="50" cy="50" r="10" fill="#000"/>
    </svg>
    <h1 class="hero-title">ASHRY</h1>
</section>

<div class="container">
    <div class="box">
        <div class="box-head" onclick="toggle(this)"><h2>🎮 عشري ستور</h2><i class="fas fa-plus"></i></div>
        <div class="box-body">
            <div class="grid">
                <div><label>الاسم</label><input type="text" id="st_name"></div>
                <div><label>اللعبة</label><select id="st_game"><option>ببجي</option><option>فري فاير</option><option>إي فوتبول</option></select></div>
                <div><label>ID</label><input type="text" id="st_id"></div>
                <div><label>الكمية</label><input type="number" id="st_qty"></div>
            </div>
            <button class="btn-send" onclick="send('Store')">طلب شحن</button>
        </div>
    </div>

    <div class="box">
        <div class="box-head" onclick="toggle(this)"><h2>🎨 عشري ديزاين</h2><i class="fas fa-plus"></i></div>
        <div class="box-body">
            <div class="grid">
                <div><label>اسم البراند</label><input type="text" id="ds_brand"></div>
                <div><label>النوع</label><select id="ds_type"><option>لوجو ملابس</option><option>لوجو 3D</option></select></div>
                <div style="grid-column: 1/-1"><label>وصف الفكرة</label><textarea id="ds_desc"></textarea></div>
            </div>
            <button class="btn-send" onclick="send('Design')">بدأ التصميم</button>
        </div>
    </div>

    <div class="box">
        <div class="box-head" onclick="toggle(this)"><h2>🛡️ السيبراني</h2><i class="fas fa-plus"></i></div>
        <div class="box-body">
            <div class="grid">
                <div><label>الخدمة</label><select id="cy_type"><option>تأمين</option><option>سحب بيانات</option></select></div>
                <div style="grid-column: 1/-1"><label>المتطلبات</label><textarea id="cy_req"></textarea></div>
            </div>
            <button class="btn-send" onclick="send('Cyber')">تنفيذ الآن</button>
        </div>
    </div>

    <div class="box">
        <div class="box-head" onclick="toggle(this)"><h2>📚 الأكاديمية</h2><i class="fas fa-plus"></i></div>
        <div class="box-body">
            <div class="grid">
                <div><label>الكورس</label><select id="ac_course"><option>هكر أخلاقي</option><option>برمجة</option></select></div>
                <div><label>الاسم المستعار</label><input type="text" id="ac_nick"></div>
            </div>
            <button class="btn-send" onclick="send('Academy')">حجز مكان</button>
        </div>
    </div>

    <div style="margin-top: 40px;">
        <h2 style="text-align: center; color: var(--red);">REVIEWS</h2>
        <div id="fake-list"></div>
        <div id="user-list"></div>
        <input type="text" id="rn" placeholder="اسمك">
        <textarea id="rt" placeholder="رأيك..."></textarea>
        <button class="btn-order btn-send" onclick="addR()">نشر</button>
    </div>
</div>

<script>
    function toggleTheme() {
        const b = document.body;
        b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }
    function toggle(el) { el.parentElement.classList.toggle('open'); }
    
    function send(service) {
        let msg = `طلب خدمة ${service}:%0A`;
        if(service === 'Store') msg += `الاسم: ${document.getElementById('st_name').value}%0Aاللعبة: ${document.getElementById('st_game').value}%0Aالـ ID: ${document.getElementById('st_id').value}%0Aالكمية: ${document.getElementById('st_qty').value}`;
        if(service === 'Design') msg += `البراند: ${document.getElementById('ds_brand').value}%0Aالوصف: ${document.getElementById('ds_desc').value}`;
        window.open(`https://wa.me/201038760809?text=${msg}`, '_blank');
    }

    const fakes = [
        {n:"أحمد", t:"شحن سريع"}, {n:"مصطفى", t:"شغل احترافي"}, {n:"سارة", t:"ممتاز"}, {n:"عمر", t:"ثقة"}, {n:"كريم", t:"رجعت حسابي"}, 
        {n:"ياسين", t:"عاش"}, {n:"إبراهيم", t:"لوجو روعة"}, {n:"خالد", t:"سرعة"}, {n:"نور", t:"أنصح به"}, {n:"يوسف", t:"بوت قوي"},
        {n:"حازم", t:"جامد"}, {n:"رمضان", t:"رائع"}, {n:"زياد", t:"أمان"}, {n:"هاني", t:"بطل"}, {n:"طارق", t:"تعليمي"}, 
        {n:"عزت", t:"صادق"}, {n:"مينا", t:"فنان"}, {n:"أسامة", t:"عالمي"}, {n:"وائل", t:"جيد جدا"}, {n:"سامي", t:"توب"}
    ];

    document.addEventListener('DOMContentLoaded', () => {
        const c = document.getElementById('fake-list');
        fakes.forEach(f => {
            const d = document.createElement('div'); d.className = 'rev-card';
            d.innerHTML = `<strong>${f.n}:</strong> ${f.t}`; c.appendChild(d);
        });
    });

    function addR() {
        const n = document.getElementById('rn').value, t = document.getElementById('rt').value;
        if(!n || !t) return;
        const d = document.createElement('div'); d.className = 'rev-card'; d.style.borderColor = "#4caf50";
        d.innerHTML = `<strong>${n}:</strong> ${t}`; document.getElementById('user-list').prepend(d);
    }
</script>
</body>
</html>
