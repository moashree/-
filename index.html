<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASHRY NETWORK | RGB EDITION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --red: #ff0000;
            --black: #050505;
            --rgb-speed: 3s;
        }

        * { box-sizing: border-box; outline: none; }
        body, html {
            margin: 0; padding: 0;
            background: var(--black);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* خلفية ضبابية متحركة */
        .mist-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -10; background: radial-gradient(circle at 50% 50%, #1a0000 0%, #000 100%);
        }

        /* انيميشن الـ RGB */
        @keyframes rgb-border {
            0% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
            33% { border-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
            66% { border-color: #0000ff; box-shadow: 0 0 10px #0000ff; }
            100% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
        }

        @keyframes rgb-text {
            0% { color: #ff0000; text-shadow: 0 0 15px #ff0000; }
            50% { color: #ff00ff; text-shadow: 0 0 15px #ff00ff; }
            100% { color: #ff0000; text-shadow: 0 0 15px #ff0000; }
        }

        .eye-wrap {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        .sharingan-svg {
            width: 220px; height: 220px;
            filter: drop-shadow(0 0 30px var(--red));
            animation: rotateEye 15s linear infinite;
        }

        @keyframes rotateEye { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .hero-title {
            font-family: 'Orbitron', sans-serif; font-size: clamp(3rem, 12vw, 6rem);
            font-weight: 900; margin: 20px 0;
            animation: rgb-text 5s infinite;
        }

        /* كروت الأقسام RGB */
        .section-box {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid var(--red);
            border-radius: 20px;
            margin-bottom: 35px;
            overflow: hidden;
            transition: 0.4s;
            animation: rgb-border var(--rgb-speed) infinite linear;
        }

        .section-trigger {
            padding: 30px; cursor: pointer; display: flex;
            align-items: center; justify-content: space-between;
        }

        .section-trigger h2 { margin: 0; font-size: 1.5rem; color: #fff; }

        .section-body {
            max-height: 0; overflow: hidden; transition: 0.8s ease-in-out;
            padding: 0 30px;
        }
        .section-box.open .section-body { max-height: 1500px; padding: 30px; }

        /* مربعات الإدخال RGB */
        input, select, textarea {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: rgba(0,0,0,0.6);
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            transition: 0.3s;
        }
        input:focus {
            border-color: var(--red);
            box-shadow: 0 0 20px var(--red);
        }

        /* زر الإرسال نيون */
        .btn-order {
            width: 100%; padding: 20px;
            background: transparent;
            border: 2px solid var(--red);
            color: #fff; border-radius: 15px;
            font-weight: 900; cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .btn-order:hover {
            background: var(--red);
            box-shadow: 0 0 50px var(--red);
            transform: scale(1.02);
        }

        /* قسم التعليقات RGB */
        .review-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px; border-radius: 15px;
            margin-bottom: 15px;
            border-left: 5px solid var(--red);
            animation: rgb-border 4s infinite;
        }

        .social-grid { display: flex; gap: 15px; margin-top: 20px; }
        .s-link {
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #fff; color: #fff; text-decoration: none;
            transition: 0.3s;
        }
        .s-link:hover {
            border-color: var(--red);
            box-shadow: 0 0 20px var(--red);
            transform: rotate(360deg);
        }

    </style>
</head>
<body>

    <div class="mist-container"></div>

    <section class="eye-wrap">
        <svg class="sharingan-svg" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="45" fill="#ff0000" stroke="#000" stroke-width="2"/>
            <circle cx="50" cy="50" r="15" fill="#000"/>
            <g id="blade">
                <path d="M50 10 Q 65 25 50 50 Q 35 25 50 10" fill="#000"/>
            </g>
            <use href="#blade" transform="rotate(120 50 50)"/>
            <use href="#blade" transform="rotate(240 50 50)"/>
        </svg>
        <h1 class="hero-title">ASHRY NETWORK</h1>
        <div class="social-grid">
            <a href="#" class="s-link"><i class="fab fa-whatsapp"></i></a>
            <a href="#" class="s-link"><i class="fab fa-discord"></i></a>
            <a href="#" class="s-link"><i class="fab fa-instagram"></i></a>
        </div>
    </section>

    <div class="container" style="max-width: 800px; margin: 0 auto; padding: 20px;">
        
        <div class="section-box">
            <div class="section-trigger" onclick="toggle(this)">
                <h2>🎮 STORE SERVICES</h2>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="section-body">
                <input type="text" placeholder="الاسم الكامل">
                <select>
                    <option>شدات ببجي</option>
                    <option>جواهر فري فاير</option>
                </select>
                <button class="btn-order">اطلب الآن</button>
            </div>
        </div>

        <div class="section-box">
            <div class="section-trigger" onclick="toggle(this)">
                <h2>🛡️ CYBER SECURITY</h2>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="section-body">
                <p>خدمات تأمين الحسابات واختبار الاختراق.</p>
                <button class="btn-order">تواصل مع الخبير</button>
            </div>
        </div>

        <div class="reviews-wrap" style="margin-top: 50px;">
            <h2 style="text-align: center; animation: rgb-text 3s infinite;">REVIEWS</h2>
            <div id="reviews-list"></div>
            <div style="margin-top: 20px;">
                <input type="text" id="rev_name" placeholder="اسمك">
                <textarea id="rev_text" placeholder="تعليقك..."></textarea>
                <button class="btn-order" onclick="addReview()">نشر التعليق نيون ⚡</button>
            </div>
        </div>

    </div>

    <script>
        // نظام الحفظ في المتصفح
        document.addEventListener('DOMContentLoaded', function() {
            const saved = JSON.parse(localStorage.getItem('ashry_rgb_comments')) || [];
            saved.forEach(rev => render(rev.name, rev.text));
        });

        function toggle(el) {
            el.parentElement.classList.toggle('open');
        }

        function addReview() {
            const name = document.getElementById('rev_name').value;
            const text = document.getElementById('rev_text').value;
            if(!name || !text) return;

            render(name, text);

            const saved = JSON.parse(localStorage.getItem('ashry_rgb_comments')) || [];
            saved.push({name, text});
            localStorage.setItem('ashry_rgb_comments', JSON.stringify(saved));

            document.getElementById('rev_name').value = '';
            document.getElementById('rev_text').value = '';
        }

        function render(name, text) {
            const div = document.createElement('div');
            div.className = 'review-card';
            div.innerHTML = `<strong>${name}:</strong> <p>${text}</p>`;
            document.getElementById('reviews-list').prepend(div);
        }
    </script>
</body>
</html>
